<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio | Thầy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <img
        class="avatar"
        src="avatar.jpg"
        alt="Avatar"
      />

      <h1>Thầy Azin</h1>
      <p class="role">Sinh viên • Yêu code • Thích Hàn Quốc 🇰🇷</p>
      <p class="bio">
        Xin chào, mình là Azin. Mình thích học lập trình web, thiết kế giao diện đẹp
        và xây mấy project nhỏ cho vui.
      </p>

      <div class="stats">
        <div>
          <strong>12+</strong>
          <span>Project</span>
        </div>
        <div>
          <strong>1.2k</strong>
          <span>Followers</span>
        </div>
        <div>
          <strong>4 năm</strong>
          <span>Học code</span>
        </div>
      </div>

      <nav class="links">
        <a href="#" aria-label="Facebook">Facebook</a>
        <a href="#" aria-label="GitHub">GitHub</a>
        <a href="#" aria-label="Instagram">Instagram</a>
      </nav>

      <button id="followBtn" class="follow-btn">Theo dõi</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
